<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectado - Gaman WiFi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .portal-card{max-width:420px;width:100%}
  </style>
</head>
<body>
  <div class="portal-card">
    <div class="card shadow-sm">
      <div class="card-body text-center p-4">
        <i class="bi bi-check-circle fs-1 text-success mb-2 d-block"></i>
        <h4 class="mb-1">Conectado</h4>
        <p class="text-muted mb-3">Ya podés usar internet.</p>
        {% if picture %}
        <img src="{{ picture }}" alt="" class="rounded-circle mb-2" width="64" height="64" referrerpolicy="no-referrer">
        {% endif %}
        <p class="mb-1"><strong>{{ name }}</strong></p>
        <p class="text-muted small">{{ email }}</p>
        <p class="text-muted small mt-3 mb-0">Podés cerrar esta ventana.</p>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">Gaman WiFi</p>
  </div>
</body>
</html>
