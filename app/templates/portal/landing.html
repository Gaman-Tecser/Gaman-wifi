<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectarse a WiFi - Gaman WiFi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .portal-card{max-width:420px;width:100%}
    .google-btn{background:#fff;border:1px solid #dadce0;color:#3c4043;font-weight:500;display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 24px;border-radius:4px;font-size:15px;transition:box-shadow .2s}
    .google-btn:hover{box-shadow:0 1px 3px rgba(0,0,0,.2);color:#3c4043}
    .google-icon{width:20px;height:20px}
  </style>
</head>
<body>
  <div class="portal-card">
    <div class="card shadow-sm">
      <div class="card-body text-center p-4">
        <i class="bi bi-wifi fs-1 text-primary mb-2 d-block"></i>
        <h4 class="mb-1">Bienvenido</h4>
        <p class="text-muted mb-4">Inicia sesión con tu cuenta de Google para conectarte a la red WiFi.</p>

        <a href="{{ url_for('portal.login', mac=mac) }}" class="google-btn text-decoration-none d-inline-flex">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Iniciar sesión con Google
        </a>

        <hr class="my-4">
        <p class="text-muted small mb-0">
          Solo cuentas de dominios autorizados pueden acceder.
        </p>
      </div>
    </div>
    <p class="text-center text-muted small mt-3">Gaman WiFi</p>
  </div>
</body>
</html>
