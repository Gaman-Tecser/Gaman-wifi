<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conectarse a WiFi - Gaman WiFi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .portal-card{max-width:420px;width:100%}
  </style>
</head>
<body>
  <div class="portal-card">
    <div class="card shadow-sm">
      <div class="card-body text-center p-4">
        <i class="bi bi-wifi fs-1 text-primary mb-2 d-block"></i>
        <h4 class="mb-1">Bienvenido</h4>
        <p class="text-muted mb-4">Al continuar, acepta los términos de uso de la red WiFi.</p>

        <a href="http://wifi.apps.grupogaman.com.ar" class="btn btn-primary btn-lg w-100">
          <i class="bi bi-check-circle me-2"></i>Aceptar y conectar
        </a>

        <hr class="my-4">
        <p class="text-muted small mb-0">Gaman WiFi</p>
      </div>
    </div>
  </div>
</body>
</html>
